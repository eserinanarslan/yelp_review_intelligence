project:
  random_state: 42

paths:
  data_dir: "yelp_datasets/yelp_dataset"
  processed_dir: "data/processed"
  model_dir: "models"
  output_dir: "outputs"

raw_files:
  reviews: "yelp_academic_dataset_review.json"
  business: "yelp_academic_dataset_business.json"
  tips: "yelp_academic_dataset_tip.json"

data:
  review_limit: 1000000
  train_ratio: 0.8
  train_sample_size: 200000

model:
  target_col: "target_sentiment"
  labels: [negative, neutral, positive]
  grid_search:
    cv: 3
    scoring: "f1_macro"
    n_jobs: -1
    verbose: 2
    param_grid:
      preprocessor__text__ngram_range: [[1, 1], [1, 2]]
      preprocessor__text__min_df: [3, 5, 10]
      preprocessor__text__max_features: [50000, 100000]
      classifier__C: [0.5, 1.0, 2.0]

topics:
  Food Quality: [food, taste, delicious, cold, fresh, overcooked, undercooked, pizza, pasta, burger, sushi, meal, dish]
  Service: [services, staff, waiter, waitress, server, manager, rude, friendly, polite, attentive]
  Waiting Time: [wait, waiting, minutes, hour, line, queue, slow, reservation, table]
  Price: [price, expensive, cheap, overpriced, value, money, cost]
  Cleanliness: [clean, dirty, bathroom, restroom, smell, hygiene]
  Atmosphere: [atmosphere, ambience, music, noise, loud, cozy, decor, vibe]
  Parking: [parking, park, garage, valet]

severity:
  high_severity_patterns: [never again, worst, terrible, horrible, disgusting, left without, waited, rude, cold food, dirty]
  long_review_threshold: 120
